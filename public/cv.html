<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV Builder | SummrTools</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
:root{--green:#1D9E75;--green-dark:#0F6E56;--green-light:#E1F5EE;--text:#0E1C16;--text-secondary:#4A6358;--text-muted:#8AA89C;--bg:#FAFCFB;--surface:#FFFFFF;--border:rgba(29,158,117,0.15);--border-strong:rgba(29,158,117,0.3);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:60px;background:rgba(250,252,251,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
.nav-back{display:inline-flex;align-items:center;gap:6px;font-size:14px;color:var(--text-secondary);text-decoration:none;padding:6px 12px;border-radius:8px;border:1px solid var(--border-strong);}
.nav-back:hover{background:var(--green-light);color:var(--green);}
.nav-brand{font-size:15px;font-weight:500;color:var(--text);}
.nav-brand span{color:var(--green);}
.wrap{max-width:780px;margin:0 auto;padding:80px 1.5rem 3rem;}
.tool-header{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;}
.tool-logo-icon{width:40px;height:40px;border-radius:10px;background:var(--green);display:flex;align-items:center;justify-content:center;}
.tool-logo-icon i{color:#fff;font-size:20px;}
.tool-name{font-size:20px;font-weight:500;}
.tool-sub{font-size:13px;color:var(--text-muted);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;}
.field{display:flex;flex-direction:column;gap:4px;}
.field.full{grid-column:1/-1;}
.label{font-size:12px;font-weight:500;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.05em;}
.input{padding:10px 12px;border:1px solid var(--border-strong);border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;background:#fff;color:var(--text);transition:border-color .2s,box-shadow .2s;}
.input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(29,158,117,0.1);}
textarea.input{resize:vertical;min-height:90px;}
.gen-btn{background:var(--green);color:#fff;border:none;border-radius:10px;padding:12px 28px;font-size:15px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:background .2s;}
.gen-btn:hover{background:var(--green-dark);}
.gen-btn:disabled{opacity:.5;cursor:not-allowed;}
.result-box{background:#f9fefb;border:1px solid var(--border-strong);border-radius:12px;padding:1.5rem;margin-top:1.5rem;display:none;}
.result-box.vis{display:block;}
.result-text{font-size:14px;line-height:1.9;white-space:pre-wrap;color:var(--text);font-family:'DM Sans',sans-serif;}
.copy-btn{margin-top:1rem;font-size:13px;padding:7px 16px;border:1px solid var(--border-strong);border-radius:8px;background:transparent;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:'DM Sans',sans-serif;}
.copy-btn:hover{background:var(--green-light);}
.pdf-btn{margin-top:1rem;font-size:13px;padding:7px 16px;border:none;border-radius:8px;background:var(--green);color:#fff;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:'DM Sans',sans-serif;font-weight:500;}
.pdf-btn:hover{background:var(--green-dark);}
.result-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:1rem;}
.ats-section{margin-top:1.5rem;border-top:1px solid var(--border);padding-top:1.5rem;}
.ats-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem;}
.ats-title{font-size:15px;font-weight:500;display:flex;align-items:center;gap:6px;}
.ats-btn{font-size:13px;padding:7px 16px;border:1px solid var(--border-strong);border-radius:8px;background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--text-secondary);display:inline-flex;align-items:center;gap:6px;}
.ats-btn:hover{background:var(--green-light);color:var(--green);border-color:var(--green);}
.ats-score-wrap{display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem;}
.ats-score-circle{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;flex-shrink:0;border:3px solid;}
.ats-score-info{flex:1;}
.ats-score-label{font-size:13px;font-weight:500;margin-bottom:2px;}
.ats-score-sub{font-size:12px;color:var(--text-muted);}
.ats-suggestion{background:#fff;border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:.75rem;}
.ats-suggestion-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:.5rem;}
.ats-suggestion-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;}
.ats-suggestion-icon.high{background:#fff0f0;color:#c0392b;}
.ats-suggestion-icon.medium{background:#FFF3CD;color:#856404;}
.ats-suggestion-icon.low{background:var(--green-light);color:var(--green-dark);}
.ats-suggestion-title{font-size:13px;font-weight:500;flex:1;}
.ats-suggestion-desc{font-size:13px;color:var(--text-secondary);line-height:1.5;margin-bottom:.75rem;}
.ats-suggestion-fix{font-size:12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:.5rem .75rem;margin-bottom:.75rem;color:var(--text-secondary);font-style:italic;}
.ats-actions{display:flex;gap:6px;}
.accept-btn{font-size:12px;padding:5px 12px;border:none;border-radius:6px;background:var(--green);color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:4px;}
.deny-btn{font-size:12px;padding:5px 12px;border:1px solid var(--border-strong);border-radius:6px;background:transparent;color:var(--text-secondary);cursor:pointer;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:4px;}
.deny-btn:hover{background:#fff0f0;color:#c0392b;border-color:#c0392b;}
.ats-applied{font-size:12px;color:var(--green);display:flex;align-items:center;gap:4px;font-weight:500;}
.ats-denied{font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:4px;}
@media print{
  body > *:not(#pdf-frame){display:none !important;}
  #pdf-frame{display:block !important;position:fixed;inset:0;background:#fff;padding:2.5rem;font-family:'DM Sans',sans-serif;font-size:13px;line-height:1.8;color:#000;white-space:pre-wrap;}
}
.error-box{background:#fff5f5;border:1px solid rgba(220,50,50,0.2);border-radius:8px;padding:.75rem 1rem;margin-top:1rem;font-size:13px;color:#c0392b;display:none;}
.error-box.vis{display:block;}
@media(max-width:600px){.form-grid{grid-template-columns:1fr;}.field.full{grid-column:1;}}
</style>
</head>
<body>
<nav>
  <a class="nav-back" href="https://summrtools.co.zw/dashboard.html"><i class="ti ti-arrow-left"></i> SummrTools</a>
  <div class="nav-brand">CV Builder · <span>AI-Powered</span></div>
  <div></div>
</nav>
<div class="wrap">
  <div class="tool-header">
    <div class="tool-logo-icon"><i class="ti ti-file-cv"></i></div>
    <div><div class="tool-name">AI CV Builder</div><div class="tool-sub">Fill in your details — AI crafts a professional CV</div></div>
  </div>
  <!-- Profile status banner -->
  <div id="profile-banner" style="background:var(--green-light);border:1px solid var(--border-strong);border-radius:10px;padding:.75rem 1rem;margin-bottom:1.25rem;font-size:13px;color:var(--green-dark);display:flex;align-items:center;justify-content:space-between;gap:8px;">
    <span><i class="ti ti-loader" id="profile-banner-icon"></i> <span id="profile-banner-text">Loading your profile...</span></span>
    <a href="https://summrtools.co.zw/cv_profile.html" style="font-size:12px;color:var(--green-dark);font-weight:500;text-decoration:none;white-space:nowrap;"><i class="ti ti-edit"></i> Edit profile</a>
  </div>

  <!-- Profile preview (read only) -->
  <div id="profile-preview" style="display:none;">
    <div style="background:#f9fefb;border:1px solid var(--border);border-radius:10px;padding:1rem 1.25rem;margin-bottom:1.25rem;">
      <div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:.75rem;">Your profile data</div>
      <div id="preview-content" style="font-size:13px;color:var(--text-secondary);line-height:1.7;"></div>
    </div>
  </div>

  <!-- Hidden fields populated from profile -->
  <input type="hidden" id="cv-name">
  <input type="hidden" id="cv-role">
  <input type="hidden" id="cv-email">
  <input type="hidden" id="cv-contact">
  <textarea id="cv-exp" style="display:none;"></textarea>
  <textarea id="cv-edu" style="display:none;"></textarea>
  <input type="hidden" id="cv-skills">

  <!-- Only field user needs to fill -->
  <div class="field full" style="margin-bottom:1.25rem;">
    <label class="label">Job you are applying for <span style="text-transform:none;font-weight:400;">(paste the job title or full description for best results)</span></label>
    <textarea class="input" id="cv-job" placeholder="e.g. Technical Support Engineer at Gcore — paste the full job description here for a perfectly tailored CV..." style="min-height:100px;"></textarea>
  </div>
  <button class="gen-btn" id="gen-btn" onclick="generate()"><i class="ti ti-sparkles"></i> Generate my CV</button>
  <div class="error-box" id="error-box"></div>
  <div class="result-box" id="result-box">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem;">
      <div style="font-size:13px;font-weight:500;color:var(--green);"><i class="ti ti-circle-check"></i> Your CV is ready</div>
    </div>
    <div class="result-text" id="result-text"></div>
    <div class="result-actions">
      <button class="copy-btn" onclick="doCopy(this)"><i class="ti ti-copy"></i> Copy text</button>
      <button class="pdf-btn" onclick="downloadPDF()"><i class="ti ti-file-type-pdf"></i> Download as PDF</button>
    </div>

    <!-- ATS SECTION -->
    <div class="ats-section" id="ats-section" style="display:none;">
      <div class="ats-header">
        <div class="ats-title"><i class="ti ti-chart-bar" style="color:var(--green);font-size:18px;"></i> ATS Score & Suggestions</div>
        <button class="ats-btn" id="ats-run-btn" onclick="runATS()"><i class="ti ti-scan"></i> Analyse ATS score</button>
      </div>
      <div id="ats-results" style="display:none;">
        <div class="ats-score-wrap" id="ats-score-wrap"></div>
        <div id="ats-suggestions-list"></div>
        <div id="ats-regenerate-wrap" style="display:none;margin-top:1rem;">
          <button class="pdf-btn" onclick="regenerateWithFixes()" id="ats-regen-btn">
            <i class="ti ti-sparkles"></i> Regenerate CV with accepted fixes
          </button>
        </div>
      </div>
    </div>
  </div>
  <div id="pdf-frame" style="display:none;"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const sb = supabase.createClient(
  'https://wsrhuuuwqzpsprknolot.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indzcmh1dXV3cXpwc3Bya25vbG90Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5ODAzMDIsImV4cCI6MjA5NTU1NjMwMn0.SqtB1CSq5aOauLOyZkYYuFHJe_Ox5SGYpCCrIckCwoc',
  { auth: { storageKey: 'summrtools-auth', storage: window.localStorage } }
);

// API calls route through secure server proxy at /api/claude

// Check auth and credits on load
let userProfile = null;

function setBanner(icon, text, type) {
  var el = document.getElementById('profile-banner');
  var iconEl = document.getElementById('profile-banner-icon');
  var textEl = document.getElementById('profile-banner-text');
  iconEl.className = 'ti ' + icon;
  textEl.innerHTML = text;
  if (type === 'warning') {
    el.style.background = '#FFF3CD';
    el.style.borderColor = '#FFE08A';
    el.style.color = '#856404';
  } else if (type === 'error') {
    el.style.background = '#fff5f5';
    el.style.borderColor = 'rgba(192,57,43,.2)';
    el.style.color = '#c0392b';
  } else {
    el.style.background = 'var(--green-light)';
    el.style.borderColor = 'var(--border-strong)';
    el.style.color = 'var(--green-dark)';
  }
}

async function init() {
  setBanner('ti-loader', 'Checking login...', 'success');

  // Step 1: Check session
  var sessionRes = await sb.auth.getSession();
  if (!sessionRes.data || !sessionRes.data.session) {
    window.location.href = 'https://summrtools.co.zw/login.html';
    return;
  }
  var session = sessionRes.data.session;
  var uid = session.user.id;

  setBanner('ti-loader', 'Loading credits...', 'success');

  // Step 2: Load tier/credits — never throws
  var profileRes = await sb.from('profiles').select('*').eq('id', uid).maybeSingle();
  userProfile = profileRes.data || null;
  var credits = userProfile ? (userProfile.cv_credits || 0) : 0;
  var tier = userProfile ? (userProfile.tier || 'free') : 'free';
  var btn = document.getElementById('gen-btn');
  if (credits <= 0 && tier !== 'elite') {
    btn.disabled = true;
    btn.innerHTML = '<i class="ti ti-lock"></i> No credits left — upgrade to continue';
    btn.style.background = '#ccc';
  } else if (tier !== 'elite') {
    btn.innerHTML = '<i class="ti ti-sparkles"></i> Generate my CV (' + credits + ' credit' + (credits !== 1 ? 's' : '') + ' left)';
  }

  setBanner('ti-loader', 'Loading your profile...', 'success');

  // Step 3: Load CV profile data one by one — never throws
  var cvp = null, exp = [], edu = [], sk = [], lang = [];

  var r1 = await sb.from('cv_profiles').select('*').eq('user_id', uid).maybeSingle();
  cvp = r1.data || null;
  if (r1.error) console.warn('cv_profiles error:', r1.error.message);

  var r2 = await sb.from('cv_experience').select('*').eq('user_id', uid).order('sort_order');
  exp = r2.data || [];
  if (r2.error) console.warn('cv_experience error:', r2.error.message);

  var r3 = await sb.from('cv_education').select('*').eq('user_id', uid).order('sort_order');
  edu = r3.data || [];
  if (r3.error) console.warn('cv_education error:', r3.error.message);

  var r4 = await sb.from('cv_skills').select('*').eq('user_id', uid).order('sort_order');
  sk = r4.data || [];
  if (r4.error) console.warn('cv_skills error:', r4.error.message);

  var r5 = await sb.from('cv_languages').select('*').eq('user_id', uid);
  lang = r5.data || [];
  if (r5.error) console.warn('cv_languages error:', r5.error.message);

  console.log('Profile data loaded — cvp:', cvp, 'exp:', exp.length, 'edu:', edu.length, 'sk:', sk.length);

  // Step 4: Populate hidden fields
  var nameVal = (cvp && cvp.full_name) ? cvp.full_name : '';
  var emailVal = (cvp && cvp.email) ? cvp.email : session.user.email;
  var contactVal = cvp ? [cvp.phone, cvp.location].filter(Boolean).join(' · ') : '';

  document.getElementById('cv-name').value = nameVal;
  document.getElementById('cv-email').value = emailVal;
  document.getElementById('cv-contact').value = contactVal;
  document.getElementById('cv-role').value = '';

  if (exp.length) {
    document.getElementById('cv-exp').value = exp.map(function(e) {
      return e.job_title + ' at ' + e.company +
        (e.location ? ' (' + e.location + ')' : '') +
        (e.start_date ? ' | ' + e.start_date + ' - ' + (e.end_date || 'Present') : '') +
        (e.bullets && e.bullets.length ? '\n' + e.bullets.map(function(b){ return '- ' + b; }).join('\n') : '');
    }).join('\n\n');
  }

  if (edu.length) {
    document.getElementById('cv-edu').value = edu.map(function(e) {
      return e.degree + ' - ' + e.institution +
        (e.location ? ', ' + e.location : '') +
        (e.end_date ? ' (' + e.end_date + ')' : '');
    }).join('\\n');
  }

  if (sk.length) {
    document.getElementById('cv-skills').value = sk.map(function(s) {
      return (s.category ? s.category + ': ' : '') + (s.skills || []).join(', ');
    }).join(' | ');
  }

  // Step 5: Build preview and update banner
  var lines = [];
  if (nameVal) lines.push('<b>' + nameVal + '</b>' + (contactVal ? ' · ' + contactVal : ''));
  if (exp.length) lines.push('<b>Experience:</b> ' + exp.map(function(e){ return e.job_title + ' @ ' + e.company; }).join(', '));
  if (edu.length) lines.push('<b>Education:</b> ' + edu.map(function(e){ return e.degree + ', ' + e.institution; }).join(' | '));
  if (sk.length) lines.push('<b>Skills:</b> ' + sk.reduce(function(a,s){ return a.concat(s.skills||[]); },[]).slice(0,8).join(', '));
  if (lang.length) lines.push('<b>Languages:</b> ' + lang.map(function(l){ return l.language + ' (' + l.proficiency + ')'; }).join(', '));

  if (lines.length > 0) {
    document.getElementById('preview-content').innerHTML = lines.join('<br>');
    document.getElementById('profile-preview').style.display = 'block';
    setBanner('ti-circle-check', "Profile loaded — just add the job you are applying for and hit generate!", 'success');
  } else {
    setBanner('ti-alert-circle', 'No profile data found. <a href="https://summrtools.co.zw/cv_profile.html" style="color:inherit;font-weight:600;text-decoration:underline;">Set up your CV profile</a> to auto-fill this page.', 'warning');
  }
}
init();

async function generate() {
  const name=document.getElementById('cv-name').value.trim();
  const role=document.getElementById('cv-role').value.trim();
  const email=document.getElementById('cv-email').value.trim();
  const contact=document.getElementById('cv-contact').value.trim();
  const exp=document.getElementById('cv-exp').value.trim();
  const edu=document.getElementById('cv-edu').value.trim();
  const skills=document.getElementById('cv-skills').value.trim();
  const job=document.getElementById('cv-job').value.trim();
  const errBox=document.getElementById('error-box');
  errBox.className='error-box';
  if(!name && !exp){errBox.className='error-box vis';errBox.textContent='Please set up your CV profile first, or the generation has no data to work with.';return;}
  const btn=document.getElementById('gen-btn');
  btn.disabled=true;btn.innerHTML='<i class="ti ti-loader"></i> Generating your CV...';
  const resultBox=document.getElementById('result-box');
  const resultText=document.getElementById('result-text');
  resultBox.className='result-box vis';
  resultText.textContent='Building your CV with AI — this takes about 10 seconds...';
  const prompt='Format the following CV data into a clean, professional CV. Use ONLY the data provided — do not add, invent, or assume any details not explicitly listed. If a section has no data, skip it.' +
    (job ? ' Tailor the wording to suit this role: ' + job : '') +
    '\n\n=== INPUT DATA ===' +
    '\nName: ' + (name || 'Not provided') +
    '\nEmail: ' + (email || '') +
    '\nContact: ' + (contact || '') +
    '\n\nWork Experience:\n' + (exp || 'Not provided') +
    '\n\nEducation:\n' + (edu || 'Not provided') +
    '\n\nSkills: ' + (skills || 'Not provided') +
    (job ? '\n\nApplying for: ' + job : '') +
    '\n\n=== INSTRUCTIONS ===' +
    '\nFormat using these sections (only include sections with data):' +
    '\n1. CONTACT HEADER - name, email, phone, location' +
    '\n2. PROFESSIONAL SUMMARY - 2-3 sentences based strictly on the experience listed above only' +
    '\n3. WORK EXPERIENCE - list each role exactly as given, improve wording but do not add new bullets or achievements not in the input' +
    '\n4. EDUCATION - list as given' +
    '\n5. SKILLS & TOOLS - list as given' +
    '\nUse === as section dividers. Plain text only.';
  try{
    const res=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:1500,system:'You are a professional CV formatter. Your ONLY job is to format and present the data provided by the user — do NOT invent, add, embellish, or assume any information that is not explicitly given. Do not add jobs, skills, achievements, dates, or any details not present in the input. If a field is empty, leave that section minimal or omit it. Improve the wording and structure of what exists, but never fabricate content. Output clean plain text only — no markdown, no asterisks.',messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    console.log('API response:', data);
    if(data.error){errBox.className='error-box vis';errBox.textContent='API Error: '+data.error.message+' (type: '+data.error.type+')';resultBox.className='result-box';btn.disabled=false;btn.innerHTML='<i class="ti ti-sparkles"></i> Generate my CV';return;}
    if(!data.content||!data.content[0]){errBox.className='error-box vis';errBox.textContent='Unexpected response from API. Check browser console.';resultBox.className='result-box';btn.disabled=false;btn.innerHTML='<i class="ti ti-sparkles"></i> Generate my CV';return;}
    resultText.textContent=data.content[0].text;
    // Show ATS section
    document.getElementById('ats-section').style.display = 'block';
    // Auto-run ATS if JD provided
    if (document.getElementById('cv-job').value.trim()) {
      setTimeout(runATS, 500);
    }
    // Deduct credit if not elite
    if (userProfile && userProfile.tier !== 'elite') {
      const newCredits = Math.max(0, (userProfile.cv_credits || 0) - 1);
      await sb.from('profiles').update({ cv_credits: newCredits }).eq('id', userProfile.id);
      userProfile.cv_credits = newCredits;
      const btn2 = document.getElementById('gen-btn');
      if (newCredits <= 0) {
        btn2.disabled = true;
        btn2.innerHTML = '<i class="ti ti-lock"></i> No credits left — upgrade to continue';
        btn2.style.background = '#ccc';
      } else {
        btn2.innerHTML = '<i class="ti ti-sparkles"></i> Generate my CV (' + newCredits + ' credit' + (newCredits !== 1 ? 's' : '') + ' left)';
      }
    }
  }catch(e){
    console.error('Fetch error:',e);
    errBox.className='error-box vis';errBox.textContent='Network error: '+e.message+'. Make sure you are connected to the internet.';
    resultBox.className='result-box';
  }
  btn.disabled=false;btn.innerHTML='<i class="ti ti-sparkles"></i> Generate my CV';
}
function doCopy(btn){
  const text=document.getElementById('result-text').textContent;
  navigator.clipboard.writeText(text).then(()=>{
    btn.innerHTML='<i class="ti ti-check"></i> Copied!';
    setTimeout(()=>btn.innerHTML='<i class="ti ti-copy"></i> Copy text',2000);
  });
}

function downloadPDF() {
  var text = document.getElementById('result-text').textContent;
  var name = document.getElementById('cv-name').value || 'CV';
  var safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  var html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>' + name + ' CV<\/title>';
  html += '<style>body{font-family:Arial,sans-serif;font-size:13px;line-height:1.8;color:#111;padding:2.5rem;max-width:780px;margin:0 auto;}';
  html += 'pre{white-space:pre-wrap;font-family:Arial,sans-serif;font-size:13px;line-height:1.8;}';
  html += '@page{margin:1.5cm;}<\/style><\/head><body><pre>' + safe + '<\/pre><\/body><\/html>';
  var w = window.open('', '_blank');
  w.document.write(html);
  w.document.close();
  w.focus();
  setTimeout(function(){ w.print(); w.close(); }, 500);
}

let atsSuggestions = [];
let acceptedFixes = [];

async function runATS() {
  const cv = document.getElementById('result-text').textContent;
  const job = document.getElementById('cv-job').value.trim();
  if (!job) { alert('Please add the job description to get an ATS score.'); return; }
  const btn = document.getElementById('ats-run-btn');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader"></i> Analysing...';
  document.getElementById('ats-results').style.display = 'none';
  try {
    const res = await fetch('/api/claude', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-5', max_tokens: 1500,
        system: 'You are an ATS expert. Analyse CVs against job descriptions. Return ONLY valid JSON, no markdown, no extra text.',
        messages: [{ role: 'user', content: 'Analyse this CV against the job description. Return ONLY a JSON object with: score (0-100), summary (string), suggestions (array of max 6 objects each with priority high/medium/low, title, description, fix). No markdown, no extra text.\n\nJOB DESCRIPTION:\n' + job + '\n\nCV:\n' + cv }]
      })
    });
    const data = await res.json();
    const raw = data.content && data.content[0] && data.content[0].text;
    const match = raw.match(/\{[\s\S]*\}/);
    const result = JSON.parse(match ? match[0] : raw);
    renderATS(result);
  } catch(e) {
    console.error('ATS error:', e);
    btn.innerHTML = '<i class="ti ti-scan"></i> Retry analysis';
    btn.disabled = false;
  }
}

function renderATS(result) {
  atsSuggestions = result.suggestions || [];
  acceptedFixes = [];
  const score = result.score || 0;
  const color = score >= 75 ? '#1D9E75' : score >= 50 ? '#EF9F27' : '#c0392b';
  const label = score >= 75 ? 'Strong match' : score >= 50 ? 'Moderate match' : 'Weak match';
  document.getElementById('ats-score-wrap').innerHTML =
    '<div class="ats-score-circle" style="color:' + color + ';border-color:' + color + ';">' + score + '%</div>' +
    '<div class="ats-score-info"><div class="ats-score-label" style="color:' + color + ';">' + label + '</div>' +
    '<div class="ats-score-sub">' + (result.summary || '') + '</div></div>';
  const list = document.getElementById('ats-suggestions-list');
  if (!atsSuggestions.length) {
    list.innerHTML = '<p style="font-size:13px;color:var(--text-muted);">No major issues — your CV looks well matched!</p>';
  } else {
    list.innerHTML = atsSuggestions.map(function(s, i) {
      return '<div class="ats-suggestion" id="suggestion-' + i + '">' +
        '<div class="ats-suggestion-header">' +
        '<div class="ats-suggestion-icon ' + s.priority + '"><i class="ti ' + (s.priority === 'high' ? 'ti-alert-circle' : s.priority === 'medium' ? 'ti-alert-triangle' : 'ti-info-circle') + '"></i></div>' +
        '<div class="ats-suggestion-title">' + s.title + '</div></div>' +
        '<div class="ats-suggestion-desc">' + s.description + '</div>' +
        '<div class="ats-suggestion-fix"><i class="ti ti-bulb" style="font-size:12px;"></i> Suggested fix: ' + s.fix + '</div>' +
        '<div class="ats-actions" id="ats-actions-' + i + '">' +
        '<button class="accept-btn" onclick="acceptFix(' + i + ')"><i class="ti ti-check"></i> Accept</button>' +
        '<button class="deny-btn" onclick="denyFix(' + i + ')"><i class="ti ti-x"></i> Dismiss</button>' +
        '</div></div>';
    }).join('');
  }
  document.getElementById('ats-results').style.display = 'block';
  document.getElementById('ats-run-btn').innerHTML = '<i class="ti ti-refresh"></i> Re-analyse';
  document.getElementById('ats-run-btn').disabled = false;
}

function acceptFix(i) {
  acceptedFixes.push(atsSuggestions[i]);
  document.getElementById('ats-actions-' + i).innerHTML = '<span class="ats-applied"><i class="ti ti-circle-check"></i> Accepted — will apply on regenerate</span>';
  document.getElementById('ats-regenerate-wrap').style.display = 'block';
}

function denyFix(i) {
  document.getElementById('ats-actions-' + i).innerHTML = '<span class="ats-denied"><i class="ti ti-x"></i> Dismissed</span>';
  document.getElementById('suggestion-' + i).style.opacity = '0.5';
}

async function regenerateWithFixes() {
  if (!acceptedFixes.length) { alert('No fixes accepted yet.'); return; }
  const btn = document.getElementById('ats-regen-btn');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader"></i> Regenerating...';
  const currentCV = document.getElementById('result-text').textContent;
  const job = document.getElementById('cv-job').value.trim();
  const fixList = acceptedFixes.map(function(f, i) { return (i+1) + '. ' + f.title + ': ' + f.fix; }).join('\n');
  try {
    const res = await fetch('/api/claude', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-5', max_tokens: 1500,
        system: 'You are a CV editor. Apply ONLY the specific fixes listed. Do not change anything else. Do not add new information not in the original CV. Output the full updated CV in plain text only.',
        messages: [{ role: 'user', content: 'Apply these fixes to the CV. Change ONLY what is listed:\n\nFIXES:\n' + fixList + '\n\nCV:\n' + currentCV + '\n\nReturn the full updated CV with only these fixes applied.' }]
      })
    });
    const data = await res.json();
    const text = data.content && data.content[0] && data.content[0].text;
    if (text) {
      document.getElementById('result-text').textContent = text;
      acceptedFixes = [];
      document.getElementById('ats-regenerate-wrap').style.display = 'none';
      btn.innerHTML = '<i class="ti ti-sparkles"></i> Regenerate CV with accepted fixes';
      btn.disabled = false;
      setTimeout(runATS, 500);
    }
  } catch(e) {
    btn.innerHTML = '<i class="ti ti-sparkles"></i> Regenerate CV with accepted fixes';
    btn.disabled = false;
  }
}
</script>
